# Lab fallback: use ESO's fake provider instead of committing AWS credentials.
# For real AWS Secrets Manager, replace this provider with aws.secretRef or IRSA.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: lab-fake-store
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  provider:
    fake:
      data:
      - key: demo/db/password
        value: rotate-demo-v2-CHANGED
