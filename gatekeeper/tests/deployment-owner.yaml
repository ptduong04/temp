apiVersion: apps/v1
kind: Deployment
metadata:
  name: pass-owner
  namespace: demo
  labels:
    app: pass-owner
    owner: team-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pass-owner
  template:
    metadata:
      labels:
        app: pass-owner
        owner: team-platform
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
