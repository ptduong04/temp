apiVersion: apps/v1
kind: Deployment
metadata:
  name: reject-no-owner
  namespace: demo
  labels:
    app: reject-no-owner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reject-no-owner
  template:
    metadata:
      labels:
        app: reject-no-owner
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
