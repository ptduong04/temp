apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sdisallowedimagetags
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sDisallowedImageTags
      validation:
        openAPIV3Schema:
          type: object
          properties:
            tags:
              type: array
              items:
                type: string
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sdisallowedimagetags

      all_containers[c] {
        c := input.review.object.spec.containers[_]
      }

      all_containers[c] {
        c := input.review.object.spec.initContainers[_]
      }

      all_containers[c] {
        c := input.review.object.spec.ephemeralContainers[_]
      }

      violation[{"msg": msg}] {
        c := all_containers[_]
        tag := input.parameters.tags[_]
        endswith(c.image, sprintf(":%v", [tag]))
        msg := sprintf("container <%v> uses disallowed image tag <%v>", [c.name, tag])
      }
